                                "a": "WorkManager is a Jetpack library for reliable, deferrable background work. It guarantees your <br>task runs even if the app exits or device restarts. It handles constraints (run only on Wi-Fi, when <br>battery is not low), chaining tasks, and backward compatibility across Android versions."
                            },
                            {
                                "q": "Why is WorkManager preferred now?",
                                "a": "WorkManager is preferred because: it guarantees execution (even after restart), supports <br>constraints (only run on Wi-Fi), is backward compatible (Android 4.0+), handles battery optimization <br>restrictions automatically, supports chaining tasks, and is the official Android recommendation for <br>background work.<br><br>   AlarmManager"
                            }
                        ]
                    },
                    {
                        "topicTitle": "AlarmManager",
                        "questions": [
                            {
                                "q": "What is AlarmManager?",
                                "a": "AlarmManager is a system service that lets you schedule your app to run at a specific time in the <br>future. It can wake up the device to run your code. Think of it as setting an alarm clock for your app <br>– 'run this code at 7 AM every day'."
                            },
                            {
                                "q": "Why do we use AlarmManager?",
                                "a": "AlarmManager is used to schedule tasks at specific times or intervals, even when the app isn't <br>running. Examples: daily reminder notifications, scheduled data sync at midnight, periodic cleanup <br>tasks, countdown timers that work even when device is restarted."
                            },
                            {
                                "q": "What is RTC_WAKEUP?",
                                "a": "RTC_WAKEUP is an AlarmManager alarm type. RTC = Real Time Clock (wall clock time like <br>3:00 PM). WAKEUP = wakes up the device if it's sleeping. So RTC_WAKEUP alarm fires at a <br>specific wall clock time AND wakes the device. Other types: ELAPSED_REALTIME_WAKEUP <br>(since boot time)."
                            },
                            {
                                "q": "How does AlarmManager work?",
                                "a": "You get AlarmManager system service, create a PendingIntent (what to do when alarm fires), <br>and call alarm.set() with alarm type, trigger time, and PendingIntent. At the specified time, Android <br>fires the alarm and executes the PendingIntent (usually triggering a BroadcastReceiver)."
                            },
                            {
                                "q": "What is PendingIntent?",
                                "a": "PendingIntent is an Intent that is given to another application/system to fire on your behalf at a <br>later time. AlarmManager holds a PendingIntent and fires it when the alarm triggers. It's like writing <br>a letter and giving it to someone else to mail later."
                            },
                            {
                                "q": "Why is PendingIntent required?",
                                "a": "PendingIntent is required because when the alarm fires, your app may not be running. The <br>system needs a pre-packaged intent to execute. PendingIntent contains the intent AND the <br>permission to execute it as if your app were running. Without it, alarm couldn't trigger anything."
                            },
                            {
                                "q": "Can AlarmManager work when app is closed?",
                                "a": "Yes! AlarmManager alarms survive app closure. When the alarm fires, Android can start your <br>BroadcastReceiver even if the app isn't running. However, alarms are cleared when the device <br>restarts unless you re-schedule them in a BOOT_COMPLETED receiver.<br><br>Practical Questions"
                            },
                            {
                                "q": "How do you set an alarm in Android?",
                                "a": "AlarmManager am = (AlarmManager) getSystemService(ALARM_SERVICE); Intent intent = new <br>Intent(this, MyAlarmReceiver.class); PendingIntent pi = PendingIntent.getBroadcast(this, 0, intent, <br>0); long triggerTime = System.currentTimeMillis() + 60000; // 1 min from now <br>am.set(AlarmManager.RTC_WAKEUP, triggerTime, pi);"
                            },
                            {
                                "q": "What happens when alarm triggers?",
                                "a": "When the alarm time is reached, AlarmManager fires the PendingIntent. If it's a getBroadcast <br>PendingIntent, Android starts the BroadcastReceiver's onReceive() method. The receiver can then <br>show a notification, start a Service, or perform any quick action."
                            },
                            {
                                "q": "How is Broadcast Receiver used with AlarmManager?",
                                "a": "BroadcastReceiver is typically used as the target of AlarmManager. When alarm fires, it triggers <br>the Receiver's onReceive(). Inside onReceive(), you perform the task (show notification, start <br>service). This combination allows scheduling background tasks at specific times."
                            },
                            {
                                "q": "What is the role of system clock in AlarmManager?",
                                "a": "AlarmManager uses the system clock to know when to fire alarms. RTC alarms use the wall <br>clock (real time). ELAPSED_REALTIME alarms use time since device boot. If user changes system <br>time, RTC alarms may fire at wrong times. System clock is the reference point for all scheduling.<br><br>   Android Storage<br>Basics"
                            }
                        ]
                    },
                    {
                        "topicTitle": "Android Storage (Basics)",
                        "questions": [
                            {
                                "q": "What is Android Storage System?",
                                "a": "Android Storage System is how apps save data on the device. Android provides multiple storage <br>options: Internal Storage (app-private files), External Storage (shared files), SharedPreferences <br>(key-value pairs), SQLite Database (structured data), and cloud storage. Each has different use <br>cases and access rules."
                            },
                            {
                                "q": "Why do we need storage in apps?",
                                "a": "Apps need storage to: remember user preferences (login status, settings), save user data <br>(messages, photos, documents), cache data to reduce network calls, store app data that persists <br>between sessions. Without storage, all data is lost when app closes."
                            },
                            {
                                "q": "What are types of storage in Android?",
                                "a": "Types: 1) Internal Storage – private to app, deleted on uninstall. 2) External Storage – shared <br>space (SD card / shared memory), needs permission. 3) Shared Preferences – simple key-value <br>storage. 4) SQLite Database – structured relational data. 5) Network Storage – cloud/server.<br><br>Internal Storage"
                            }
                        ]
                    },
                    {
                        "topicTitle": "Internal Storage",
                        "questions": [
                            {
                                "q": "What is internal storage?",
                                "a": "Internal Storage is private storage space allocated for each app. Only that app can access its <br>internal storage – other apps cannot read it (unless rooted). Files are stored in <br>/data/data/your.package.name/. It's always available and doesn't need permissions."
                            },
                            {
                                "q": "Is internal storage private or public?",
                                "a": "Internal storage is completely private to your app. Other apps cannot access your internal <br>storage files. Even users can't browse these files without root access. This makes it the most <br>secure storage option for sensitive data like user credentials or private user data."
                            },
                            {
                                "q": "What happens to data after uninstall?",
                                "a": "When an app is uninstalled, ALL internal storage data is automatically deleted. The user can also <br>choose to clear app data in Settings > Apps > Your App > Clear Data, which also deletes all internal <br>storage. External storage files created by the app may survive uninstall."
                            },
                            {
                                "q": "What is getFilesDir()?",
                                "a": "getFilesDir() returns a File object pointing to the directory for permanent files in internal storage. <br>Files here persist until the app is uninstalled or user clears data. Use this for files the app needs to <br>keep long-term, like user documents or app configuration files."
                            },
                            {
                                "q": "What is getCacheDir()?",
                                "a": "getCacheDir() returns a File object pointing to a cache directory in internal storage. Files here <br>are temporary – Android may delete them when storage is low. Use for temporary files (downloaded <br>images, cached responses) that can be recreated if deleted."
                            },
                            {
                                "q": "When should we use internal storage?",
                                "a": "Use internal storage for: sensitive data (passwords, tokens), app configuration, data that should <br>not be accessible to other apps or users, files that should be deleted with the app. Default choice <br>for most app data storage.<br><br>External Storage"
                            }
                        ]
                    },
                    {
                        "topicTitle": "External Storage",
                        "questions": [
                            {
                                "q": "What is external storage?",
                                "a": "External Storage is shared storage accessible by multiple apps and the user. Originally it was SD <br>card, now it's also shared internal memory. Files here are accessible from a computer when <br>connected via USB. Examples: Photos in DCIM, Downloads folder, Documents."
                            },
                            {
                                "q": "Is external storage secure?",
                                "a": "No – external storage is NOT secure. Other apps can read your files (with permission). Users <br>can browse and modify files using a file manager. Never store sensitive data (passwords, private <br>user data) on external storage. Only use for user-facing files they expect to access."
                            },
                            {
                                "q": "What permission is required?",
                                "a": "READ_EXTERNAL_STORAGE – to read files from external storage. <br>WRITE_EXTERNAL_STORAGE – to write/create files on external storage. Both must be declared <br>in AndroidManifest.xml AND requested at runtime (Android 6.0+). Android 10+ changed this with <br>scoped storage."
                            },
                            {
                                "q": "When should we use external storage?",
                                "a": "Use external storage for user-generated content that users expect to access outside the app: <br>photos taken with your app's camera, downloaded music/video for offline viewing, exported <br>documents/reports, files users want to share with other apps or access on a computer."
                            },
                            {
                                "q": "Can other apps access external storage?",
                                "a": "With proper permissions, yes. Before Android 10, any app with READ_EXTERNAL_STORAGE <br>could read all external files. Android 10+ introduced Scoped Storage, restricting apps to their own <br>app-specific directories and media collections, requiring MediaStore API for broad access.<br><br>Shared Preferences"
                            }
                        ]
                    },
                    {
                        "topicTitle": "Shared Preferences",
                        "questions": [
                            {
                                "q": "What is Shared Preferences?",
                                "a": "SharedPreferences is a simple key-value storage mechanism for primitive data (String, int, <br>boolean, float, long). Data is stored in an XML file in internal storage. It's the simplest storage option <br>– easy to use, no setup needed. Think of it as a permanent Map."
                            },
                            {
                                "q": "How is data stored in Shared Preferences?",
                                "a": "Data is stored as key-value pairs in an XML file. You write: SharedPreferences prefs = <br>getSharedPreferences('MyPrefs', MODE_PRIVATE); SharedPreferences.Editor editor = prefs.edit(); <br>editor.putString('username', 'John'); editor.apply(); To read: String name = <br>prefs.getString('username', 'default');"
                            },
                            {
                                "q": "What type of data is suitable?",
                                "a": "SharedPreferences is suitable for: user settings (theme, language, notifications on/off), login <br>status (isLoggedIn boolean), user ID/token for API, last opened screen, simple counters, first launch flags. NOT suitable for large data, complex objects, or lists."
                            },
                            {
                                "q": "What is key-value pair?",
                                "a": "Key-value pair means data is stored as a pair: a key (unique name/identifier) and its value. Like a <br>dictionary. Key is always a String. Example: key='isDarkMode', value=true. You retrieve data using <br>the key: prefs.getBoolean('isDarkMode', false)."
                            },
                            {
                                "q": "Limitations of Shared Preferences?",
                                "a": "Limitations: Only stores primitive types (String, int, boolean, float, long, Set<String>). Cannot <br>store complex objects, lists, or large data. Not suitable for relational data. Slower than in-memory <br>operations. Not encrypted by default (use EncryptedSharedPreferences for sensitive data).<br><br>Database (SQLite)"
                            }
                        ]
                    },
                    {
                        "topicTitle": "Database (SQLite)",
                        "questions": [
                            {
                                "q": "What is SQLite database?",
                                "a": "SQLite is a lightweight, serverless relational database built into Android. It stores data in tables <br>with rows and columns, like a mini version of MySQL. You query it using SQL. Room is the modern <br>library that wraps SQLite with an easier API. The database file is stored in internal storage."
                            },
                            {
                                "q": "When should we use database?",
                                "a": "Use database when you have: large amounts of data, complex data relationships (users have <br>orders, orders have items), need to search/filter data efficiently, need to sort data, structured data <br>with multiple fields. Examples: contacts app, note-taking app, shopping app with cart."
                            },
                            {
                                "q": "What type of data is stored in database?",
                                "a": "Databases store structured, relational data: user profiles (name, email, age, address), products <br>(ID, name, price, category), transactions (date, amount, type), messages (sender, receiver, text, <br>timestamp). Any data that has multiple attributes and needs querying."
                            },
                            {
                                "q": "Advantages of database over Shared Preferences?",
                                "a": "Database advantages: stores complex data structures, supports queries and filtering (find all <br>orders > ₹500), sorts data efficiently, handles large amounts of data, supports relationships <br>between data (user → orders), concurrent access safe. SharedPreferences only for simple key value pairs.<br><br>   File Handling (Internal Storage Code Based)"
                            }
                        ]
                    },
                    {
                        "topicTitle": "File Handling",
                        "questions": [
                            {
                                "q": "What is openFileOutput()?",
                                "a": "openFileOutput(filename, mode) is a Context method that opens a file for writing in internal <br>storage. It returns a FileOutputStream. Example: FileOutputStream fos = openFileOutput('myfile.txt', <br>MODE_PRIVATE); – creates/opens myfile.txt for writing."
                            },
                            {
                                "q": "What is openFileInput()?",
                                "a": "openFileInput(filename) is a Context method that opens a file for reading from internal storage. It <br>returns a FileInputStream. Example: FileInputStream fis = openFileInput('myfile.txt'); – opens <br>myfile.txt for reading. File must exist or FileNotFoundException is thrown."
                            },
                            {
                                "q": "What is FileOutputStream?",
                                "a": "FileOutputStream is a Java class for writing bytes to a file. To write text: <br>fos.write('Hello'.getBytes()); To write a string more easily: OutputStreamWriter writer = new <br>OutputStreamWriter(fos); writer.write('Hello'); Always close the stream in a finally block or use try with-resources."
                            },
                            {
                                "q": "What is FileInputStream?",
                                "a": "FileInputStream is a Java class for reading bytes from a file. To read text: InputStreamReader <br>reader = new InputStreamReader(fis); BufferedReader br = new BufferedReader(reader); String <br>line = br.readLine(); Always close when done reading to release the file handle."
                            },
                            {
                                "q": "What is MODE_PRIVATE?",
                                "a": "MODE_PRIVATE is a file creation mode for openFileOutput(). It makes the file accessible only <br>by your app (private). If the file already exists, it is overwritten. This is the most commonly used and <br>recommended mode for security. Other modes: MODE_APPEND, MODE_WORLD_READABLE <br>(deprecated)."
                            },
                            {
                                "q": "What is MODE_APPEND?",
                                "a": "MODE_APPEND is a file creation mode for openFileOutput(). Instead of overwriting existing file <br>content, new data is added to the end of the file. Example: openFileOutput('log.txt', <br>MODE_APPEND); – each write adds to the log instead of erasing previous entries.<br><br>   Advanced / Viva-Tricky Questions"
                            }
                        ]
                    },
                    {
                        "topicTitle": "Advanced / Tricky Questions",
                        "questions": [
                            {
                                "q": "Which storage is safest?",
                                "a": "Internal Storage is the safest – it's private to your app, not accessible by other apps or users <br>without root, and deleted on uninstall. For extra security (passwords, tokens), use <br>EncryptedSharedPreferences or Android Keystore for encryption. Never store sensitive data on <br>external storage."
                            },
                            {
                                "q": "Which storage persists after uninstall?",
                                "a": "External storage files may persist after uninstall (unless the app created them in its app-specific<br>directory on external storage). SharedPreferences, Internal Storage, and SQLite databases are all <br>deleted on uninstall. Cloud storage persists regardless of app install status."
                            },
                            {
                                "q": "Can internal storage be accessed by other apps?",
                                "a": "No – internal storage cannot be accessed by other apps under normal circumstances. Each app <br>runs in its own Linux user space and internal storage files have permissions set to owner-only. Only <br>root access or using ContentProvider (intentionally sharing data) allows other apps to access your <br>internal files."
                            },
                            {
                                "q": "What happens if storage permission is denied?",
                                "a": "If the user denies WRITE_EXTERNAL_STORAGE permission, any attempt to write to external <br>storage will fail with a SecurityException. Your app must handle this gracefully – catch the <br>exception, explain to the user why the permission is needed, and offer to work without that feature."
                            },
                            {
                                "q": "Difference between cache and file storage?",
                                "a": "Cache storage (getCacheDir()): temporary files, Android may delete when storage is low, use for <br>files you can recreate (downloaded images). File storage (getFilesDir()): permanent files, only <br>deleted on uninstall or user clearing data, use for important files you need long-term."
                            },
                            {
                                "q": "Can Broadcast Receiver start a Service?",
                                "a": "Yes! Broadcast Receiver can start a Service from onReceive(). Example: Intent serviceIntent = <br>new Intent(context, MyService.class); context.startService(serviceIntent); This is the common <br>pattern for ACTION_BOOT_COMPLETED – receiver catches boot broadcast and starts the app's <br>background service."
                            },
                            {
                                "q": "Can Service start Activity?",
                                "a": "Yes, but with restrictions in newer Android versions. You can call startActivity() from a Service, <br>but Android 10+ restricts background activity launching for user experience reasons. The <br>recommended approach is to show a Notification and let the user tap it to launch the Activity."
                            }
                        ]

        const navItemsContainer = document.getElementById('nav-items');
        const columnsWrapper = document.getElementById('columns-wrapper');

        // 1. Render Sidebar Nav Items
        qaData.forEach((unit, uIdx) => {
            const shortTitle = unit.unitTitle.split('–')[0].trim();
            const navDiv = document.createElement('div');
            navDiv.className = 'nav-item';
            navDiv.setAttribute('data-target', unit.unitId);
            navDiv.innerHTML = `
                <span>${unit.unitTitle}</span>
                <span class="nav-arrow">></span>
            `;
            navItemsContainer.appendChild(navDiv);
        });

        // 2. Render Columns & Cards
        qaData.forEach(unit => {
            const shortTitle = unit.unitTitle; // use full title for column

            const col = document.createElement('div');
            col.className = 'unit-column';
            col.id = `col-${unit.unitId}`;

            let colHtml = `<h2 class="unit-column-title">${shortTitle}</h2>`;

            unit.topics.forEach(topic => {
                colHtml += `<div class="topic-label">${topic.topicTitle}</div>`;

                topic.questions.forEach((q, qIdx) => {
                    const cardId = `${unit.unitId}-${topic.topicTitle.replace(/\s+/g, '-')}-${qIdx}`;
                    colHtml += `
                        <div class="qa-card" id="${cardId}">
                            <div class="qa-card-header">
                                <div class="qa-card-header-text">Q: ${q.q}</div>
                                <div class="chevron">▼</div>
                            </div>
                            <div class="qa-card-content">
                                <div class="qa-inner">
                                    <div class="qa-question">Q: ${q.q}</div>
                                    <div class="qa-answer">A: ${q.a || '[Provide your answer here]'}</div>
                                    <button class="copy-btn">Copy Answer</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            });

            col.innerHTML = colHtml;
            columnsWrapper.appendChild(col);
        });

        // 3. Setup Interactivity

        // Toggles
        document.addEventListener('click', (e) => {
            let header = e.target.closest('.qa-card-header');
            if (header) {
                const card = header.parentElement;
                card.classList.toggle('open');
                const chevron = header.querySelector('.chevron');
                if (card.classList.contains('open')) {
                    chevron.textContent = '▲';
                } else {
                    chevron.textContent = '▼';
                }
            }
        });

        // Copy Buttons
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('copy-btn')) {
                const btn = e.target;
                const answerDiv = btn.previousElementSibling;
                let answerText = answerDiv.innerHTML.replace(/^A:\s*/, '').replace(/<br\s*\/?>/ig, '\n');
                answerText = answerText.replace(/<[^>]+>/g, '');

                navigator.clipboard.writeText(answerText).then(() => {
                    const orig = btn.textContent;
                    btn.textContent = 'Copied!';
                    btn.style.background = '#8b5cf6';
                    btn.style.color = '#fff';
                    setTimeout(() => {
                        btn.textContent = orig;
                        btn.style.background = '';
                        btn.style.color = '';
                    }, 2000);
                }).catch(err => console.error('Copy failed', err));
            }
        });

        // Sidebar Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');

                const targetId = item.getAttribute('data-target');
                if (targetId === 'all') {
                    columnsWrapper.scrollTo({ left: 0, behavior: 'smooth' });
                } else {
                    const col = document.getElementById(`col-${targetId}`);
                    if (col) {
                        const wrapperRect = columnsWrapper.getBoundingClientRect();
                        const colRect = col.getBoundingClientRect();
                        const scrollLeft = colRect.left - wrapperRect.left + columnsWrapper.scrollLeft - 20;
                        columnsWrapper.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                    }
                }
            });
        });

        // Live Search
        const searchBox = document.getElementById('search-box');
        searchBox.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();

            document.querySelectorAll('.unit-column').forEach(col => {
                let colHasMatch = false;

                col.querySelectorAll('.qa-card').forEach(card => {
                    const qText = card.querySelector('.qa-question').textContent.toLowerCase();
                    const aText = card.querySelector('.qa-answer').textContent.toLowerCase();

                    if (qText.includes(term) || aText.includes(term)) {
                        card.classList.remove('hidden');
                        colHasMatch = true;
                        if (term.length > 0 && !card.classList.contains('open')) {
                            card.classList.add('open');
                            card.querySelector('.chevron').textContent = '▲';
                        }
                    } else {
                        card.classList.add('hidden');
                    }
                });

                if (colHasMatch || term.length === 0) {
                    col.classList.remove('hidden');
                } else {
                    col.classList.add('hidden');
                }
            });
        });
